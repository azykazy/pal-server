# azure-cli は mise (uv/pipx) 経由だと TLS 証明書検証の問題でインストールに
# 失敗する環境があるため、システムの az を使う (sudo apt install azure-cli 等)。
# アカウント分離は下の AZURE_CONFIG_DIR で効くので az の導入元は問わない。
[tools]
terraform = "1"
node = "20"

[env]
# az CLI の認証情報・プロファイルをプロジェクト配下に分離する。
# グローバルの ~/.azure (他プロジェクトのアカウント) には一切触れない。
AZURE_CONFIG_DIR = "{{config_root}}/.azure"

[tasks.login]
description = "このプロジェクト専用の Azure アカウントにログインする"
run = "az login && az account show --output table"

[tasks.build-functions]
description = "Azure Functions のデプロイ用 zip (dist/functions.zip) を作成する"
run = "bash scripts/build-functions.sh"

[tasks.deploy-functions]
description = "Functions のコードを zip 化して az CLI でデプロイする"
run = "bash scripts/deploy-functions.sh"

[tasks.seed-secrets]
description = "Key Vault にパスワード等のシークレットを投入する (未指定なら自動生成)"
run = "bash scripts/seed-secrets.sh"

[tasks.register-commands]
description = "Discord のスラッシュコマンド (/palworld) をギルドに登録する"
run = "node scripts/register-commands.mjs"

[tasks.plan]
description = "terraform plan を実行する"
run = "terraform -chdir=terraform plan"

[tasks.apply]
description = "terraform apply を実行する"
run = "terraform -chdir=terraform apply"

[tasks.update-config]
description = "サーバー設定を表示・変更する (引数なしで現在の設定を表示)"
run = "bash scripts/update-config.sh"
